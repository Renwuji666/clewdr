name: manual-opencode-build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build
        required: false
        default: master

env:
  CARGO_TERM_COLOR: always
  APT_PACKAGES: build-essential cmake perl pkg-config libclang-dev zip
  BIN_NAME: clewdr
  FEATURE_ARGS: --no-default-features --features embed-resource,portable

permissions:
  contents: read

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          check-latest: true
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Upload static directory
        uses: actions/upload-artifact@v4
        with:
          name: static-files
          path: static/
          retention-days: 1

  build:
    name: Build ${{ matrix.label }}
    needs: build-frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - label: linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install APT packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.APT_PACKAGES }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: manual-opencode-${{ matrix.target }}

      - name: Download static files
        uses: actions/download-artifact@v4
        with:
          name: static-files
          path: static

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }} $FEATURE_ARGS

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p release-package
          cp target/${{ matrix.target }}/release/${{ env.BIN_NAME }} release-package/
          cd release-package
          zip -r ../${{ env.BIN_NAME }}-${{ matrix.label }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.label }}
          path: ${{ env.BIN_NAME }}-${{ matrix.label }}.zip
          retention-days: 7
